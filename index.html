<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYLORIS LOGIC</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  z-index:1000;
}

.logo img{height:28px;}

nav a{
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:#fff;}

/* HERO */
.hero{
  height:180vh;
  position:relative;
}

.sticky{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* PRODUCT */
.product{
  width:120px;
  transition:0.1s;
  filter:drop-shadow(0 0 30px rgba(99,102,241,0.5));
}

/* TEXT ANIMATION */
.reveal{
  font-size:2.5rem;
  margin-top:20px;
  max-width:700px;
  line-height:1.4;
}

.word{
  opacity:0;
  display:inline-block;
  transform:translateY(20px);
  transition:0.4s;
}

.word.show{
  opacity:1;
  transform:translateY(0);
}

.sub{
  margin-top:10px;
  color:#aaa;
  opacity:0;
  transition:0.4s;
}

/* SERVICES */
.section{
  padding:100px 40px;
  background:#0a0f1c;
  text-align:center;
}

.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-top:30px;
}

.card{
  flex:1;
  min-width:250px;
  padding:25px;
  background:#111827;
  border-radius:15px;
  transition:0.3s;
}
.card:hover{transform:translateY(-6px);}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://files.catbox.moe/l9hhld.png">
  </div>
  <nav>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="sticky">
    <img src="https://files.catbox.moe/l9hhld.png" class="product" id="product">

    <!-- Apple Text -->
    <div class="reveal" data-text="We build digital experiences that help businesses grow online."></div>

    <p class="sub" id="sub">Premium digital solutions</p>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">

  <div class="reveal" data-text="Your website is your digital identity that turns visitors into customers."></div>

  <div class="grid">
    <div class="card">
      <h3>Web Development</h3>
      <p>Modern, fast and responsive websites.</p>
    </div>

    <div class="card">
      <h3>Software Development</h3>
      <p>Custom systems to automate and scale your business.</p>
    </div>

    <div class="card">
      <h3>Digital Marketing</h3>
      <p>Grow your reach and convert traffic into customers.</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">

  <div class="reveal" data-text="Let’s build something great together."></div>

  <button onclick="sendEmail()">Email Us</button>
</section>

<script>
const product = document.getElementById("product");
const sub = document.getElementById("sub");

/* SCROLL ENGINE */
window.addEventListener("scroll", () => {
  let y = window.scrollY;
  let max = window.innerHeight * 1.5;
  let p = y / max;

  product.style.transform = `scale(${1 + p*1.8})`;
  product.style.opacity = 1 - p*1.2;

  if(p > 0.2){
    sub.style.opacity = 1;
  }
});

/* SPLIT TEXT */
document.querySelectorAll(".reveal").forEach(el=>{
  let words = el.dataset.text.split(" ");
  el.innerHTML = words.map(w=>`<span class="word">${w}</span>`).join(" ");
});

/* ANIMATION */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      let words = entry.target.querySelectorAll(".word");
      words.forEach((w,i)=>{
        setTimeout(()=>w.classList.add("show"), i*60);
      });
    }
  });
},{threshold:0.5});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* EMAIL */
function sendEmail(){
  window.location.href="mailto:xylorislogic@gmail.com";
}
</script>

</body>
</html>
