<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYLORIS LOGIC</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  z-index:1000;
}

.logo img{height:28px;}

nav a{
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:#fff;}

/* HERO */
.hero{
  height:180vh; /* shorter scroll */
  position:relative;
}

.sticky{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* PRODUCT */
.product{
  width:120px;
  transition:0.1s;
  filter:drop-shadow(0 0 30px rgba(99,102,241,0.5));
}

/* TEXT */
.headline{
  font-size:2.8rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(30px);
  transition:0.4s;
}

.sub{
  margin-top:10px;
  color:#aaa;
  opacity:0;
  transition:0.4s;
}

/* SERVICES */
.section{
  padding:100px 40px;
  background:#0a0f1c;
}

.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  padding:25px;
  background:#111827;
  border-radius:15px;
  transition:0.3s;
}
.card:hover{transform:translateY(-6px);}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://files.catbox.moe/l9hhld.png">
  </div>
  <nav>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="sticky">
    <img src="https://files.catbox.moe/l9hhld.png" class="product" id="product">
    <h1 class="headline" id="headline">XYLORIS LOGIC</h1>
    <p class="sub" id="sub">Premium digital solutions</p>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Services</h2>
  <div class="grid">
    <div class="card"><h3>Web Development</h3></div>
    <div class="card"><h3>Software Development</h3></div>
    <div class="card"><h3>Digital Marketing</h3></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact</h2>
  <button onclick="sendEmail()">Email Us</button>
</section>

<script>
const product = document.getElementById("product");
const headline = document.getElementById("headline");
const sub = document.getElementById("sub");

/* FAST SCROLL ENGINE */
window.addEventListener("scroll", () => {
  let y = window.scrollY;
  let max = window.innerHeight * 1.5;
  let p = y / max;

  /* LIGHT ANIMATION */
  product.style.transform = `scale(${1 + p*1.8})`;
  product.style.opacity = 1 - p*1.2;

  if(p > 0.15){
    headline.style.opacity = 1;
    headline.style.transform = "translateY(0)";
  }

  if(p > 0.25){
    sub.style.opacity = 1;
  }
});

/* EMAIL */
function sendEmail(){
  window.location.href="mailto:xylorislogic@gmail.com";
}
</script>

</body>
</html>
