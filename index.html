<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYLORIS LOGIC</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>

<header>
  <img src="assets/logo.png" class="logo">
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>
      We build <span>digital experiences</span>
      that drive <span>real growth</span>
    </h1>
  </div>
</section>

<!-- SECTION 1 -->
<section class="panel dark">
  <h2>Most businesses struggle online</h2>
</section>

<!-- SECTION 2 -->
<section class="panel light">
  <h2>We turn ideas into scalable solutions</h2>
</section>

<!-- SERVICES -->
<section class="services">
  <div class="card">Web Development</div>
  <div class="card">Software Development</div>
  <div class="card">Digital Marketing</div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Let’s build something great</h2>
</section>

<script src="script.js"></script>
</body>
</html>
