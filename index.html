<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYLORIS LOGIC</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo img{height:30px;}

nav a{
  margin-left:25px;
  color:#aaa;
  text-decoration:none;
}
nav a:hover{color:#fff;}

/* HERO */
.hero{
  height:450vh;
  position:relative;
}

.sticky{
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  perspective:1200px;
}

/* CURSOR GLOW */
.cursor{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  background:radial-gradient(circle,#6366f1,transparent 70%);
  pointer-events:none;
  filter:blur(100px);
  z-index:0;
}

/* BACKGROUND GLOW */
.glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#6366f1,transparent 70%);
  filter:blur(120px);
  z-index:-1;
}

/* PRODUCT */
.product{
  width:140px;
  transition:0.1s;
  transform-style:preserve-3d;
  filter:drop-shadow(0 0 60px rgba(99,102,241,0.7));
}

/* TEXT */
.headline{
  font-size:3rem;
  margin-top:20px;
  opacity:0;
  transform:translateY(50px);
  transition:0.4s;
}

.sub{
  margin-top:10px;
  color:#aaa;
  opacity:0;
  transition:0.4s;
}

/* SECTION */
.section{
  padding:120px 60px;
  background:#0a0f1c;
}

.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  padding:30px;
  background:#111827;
  border-radius:20px;
  transition:0.3s;
}
.card:hover{transform:translateY(-10px);}

/* CONTACT */
.contact{
  text-align:center;
  padding:120px 20px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<header>
  <div class="logo">
    <img src="https://files.catbox.moe/l9hhld.png">
  </div>
  <nav>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="sticky">

    <div class="glow" id="glow"></div>

    <img src="https://files.catbox.moe/l9hhld.png" class="product" id="product">

    <h1 class="headline" id="headline">XYLORIS LOGIC</h1>
    <p class="sub" id="sub">Engineering the future of digital systems</p>

  </div>
</section>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="grid">
    <div class="card"><h3>Web Development</h3></div>
    <div class="card"><h3>Software Development</h3></div>
    <div class="card"><h3>Digital Marketing</h3></div>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Let’s Work Together</h2
  <button onclick="sendEmail()">Email Us</button>
</section>

<script>
const product = document.getElementById("product");
const headline = document.getElementById("headline");
const sub = document.getElementById("sub");
const glow = document.getElementById("glow");
const cursor = document.getElementById("cursor");

/* SCROLL ENGINE */
window.addEventListener("scroll", () => {
  let y = window.scrollY;
  let max = window.innerHeight * 3.5;
  let p = y / max;

  /* LOGO TRANSFORM */
  let scale = 1 + p * 5;
  let opacity = 1 - p * 1.3;
  let rotateX = p * 20;
  let rotateY = p * 30;

  product.style.transform =
    `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

  product.style.opacity = opacity;

  /* GLOW DEPTH */
  glow.style.transform = `scale(${1+p*2}) translateY(${p*200}px)`;

  /* TEXT TIMING */
  if(p > 0.2){
    headline.style.opacity = 1;
    headline.style.transform = "translateY(0)";
  }

  if(p > 0.4){
    sub.style.opacity = 1;
  }
});

/* CURSOR GLOW */
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX - 150 + "px";
  cursor.style.top = e.clientY - 150 + "px";
});

/* EMAIL */
function sendEmail(){
  window.location.href="mailto:xylorislogic@gmail.com";
}
</script>

</body>
</html>
