<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYLORIS LOGIC</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>

<header>
  <img src="assets/logo.png" class="logo">
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <img src="assets/mockup1.png" class="hero-img">
    <h1>We build digital experiences</h1>
  </div>
</section>

<!-- HORIZONTAL SCROLL -->
<section class="horizontal">
  <div class="track">

    <div class="panel">
      <img src="assets/mockup1.png">
      <h2>Your website is your identity</h2>
    </div>

    <div class="panel">
      <img src="assets/mockup2.png">
      <h2>Software that scales your business</h2>
    </div>

    <div class="panel">
      <img src="assets/mockup3.png">
      <h2>Marketing that drives growth</h2>
    </div>

  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>What We Do</h2>
  <div class="grid">
    <div class="card">Web Development</div>
    <div class="card">Software Development</div>
    <div class="card">Digital Marketing</div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Let’s build something great</h2>
</section>

<script src="script.js"></script>
</body>
</html>
